<!DOCTYPE html>
<html>
<head>
    <title>Escena 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin:0;
            height:100vh;
            font-family: 'Orbitron', sans-serif;
            color:#e0e0e0;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background-color:black;
            overflow:hidden;
        }

        h1 {
            color:#ff4d4d;
            text-shadow:0 0 10px #ff0000;
            margin-bottom:20px;
        }

        p {
            max-width:600px;
            margin-bottom:10px;
        }

        a.back {
            margin:10px;
            padding:12px 25px;
            border:1px solid #aaaaaa;
            color:#aaaaaa;
            text-decoration:none;
        }
    </style>
</head>
<body>

    <video autoplay muted playsinline style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        object-fit:cover;
        z-index:-1;
        filter: brightness(0.4) contrast(1.4) sepia(0.7) saturate(0.6) hue-rotate(-15deg);
    ">
        <source src="assets/puerta final.mp4" type="video/mp4">
    </video>

    <div style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background: url('assets/final_exit.jpg') center/cover no-repeat;
        z-index:-2;
        filter: brightness(0.4) contrast(1.2) sepia(0.4);
    "></div>

    <h1>¡Alarma activada!</h1>
    <p>El cuarto de máquinas empieza a retumbar y las luces parpadean con intensidad.</p>
    <p>La señal ha alcanzado su pico y ahora todo indica peligro inminente.</p>
    <p>Debes salir rápidamente antes de que algo falle o explote.</p>

    <a href="escena4.html" class="back">Volver atrás</a>

    <audio autoplay loop>
        <source src="assets/alarma.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>
    
</body>
</html>
